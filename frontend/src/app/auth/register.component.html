<section class="auth-page">
  <div class="auth-orb"></div>
  <div class="auth-brand">
    <span>S</span><strong>Sigurna<small>BANKA</small></strong>
  </div>
  <div class="auth-card register glass">
    <p class="eyebrow">NOVO DIGITALNO BANKARSTVO</p>
    <h1>Otvorite svoj profil.</h1>
    <p class="intro">Jednostavan početak sigurnog upravljanja novcem.</p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="names">
        <label>Ime<input class="input" formControlName="firstName" /></label
        ><label
          >Prezime<input class="input" formControlName="lastName"
        /></label>
      </div>
      <label
        >E-mail adresa<input
          class="input"
          type="email"
          formControlName="email"
          autocomplete="email" /></label
      ><label
        >Lozinka<input
          class="input"
          type="password"
          formControlName="password"
          autocomplete="new-password"
        /><small>Najmanje 8 znakova</small></label
      >
      @if (error) {
        <div class="error">{{ error }}</div>
      }
      <button
        class="btn btn-primary submit"
        [disabled]="loading || form.invalid"
      >
        {{ loading ? "Otvaranje..." : "Registriraj se" }} <span>→</span>
      </button>
    </form>
    <p class="switch">
      Već imate profil? <a routerLink="/login">Prijavite se</a>
    </p>
  </div>
</section>
